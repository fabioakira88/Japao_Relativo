<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 1080px; height: 1080px; background: #0d0d1a; font-family: 'Georgia', serif; overflow: hidden; }
  .card { width: 1080px; height: 1080px; background: #0d0d1a; display: flex; flex-direction: column; justify-content: space-between; padding: 72px 80px; position: relative; }
  .top-bar { display: flex; align-items: center; justify-content: space-between; }
  .tag { background: #2a1a4e; color: #c9a0ff; font-family: 'Arial', sans-serif; font-size: 18px; font-weight: 600; letter-spacing: 0.08em; padding: 10px 22px; border-radius: 30px; text-transform: uppercase; }
  .date { font-family: 'Arial', sans-serif; font-size: 18px; color: #666; letter-spacing: 0.04em; }
  .middle { flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 36px; padding: 60px 0 40px; }
  .eyebrow { font-family: 'Arial', sans-serif; font-size: 20px; color: #9b7fd4; letter-spacing: 0.12em; text-transform: uppercase; font-weight: 500; }
  .headline { font-size: 72px; font-weight: 700; color: #ffffff; line-height: 1.15; letter-spacing: -0.01em; }
  .headline em { color: #c084fc; font-style: normal; }
  .divider { width: 80px; height: 3px; background: #7c3aed; border-radius: 2px; }
  .body-text { font-family: 'Arial', sans-serif; font-size: 26px; color: #a89fc0; line-height: 1.65; max-width: 820px; font-weight: 400; }
  .body-text strong { color: #e0d4ff; font-weight: 600; }
  .bottom { display: flex; align-items: flex-end; justify-content: space-between; }
  .cta { font-family: 'Arial', sans-serif; font-size: 20px; color: #7c3aed; letter-spacing: 0.06em; text-transform: uppercase; font-weight: 700; border-bottom: 2px solid #7c3aed; padding-bottom: 4px; }
  .hashtags { font-family: 'Arial', sans-serif; font-size: 17px; color: #4a3a6e; text-align: right; line-height: 1.8; }
  .accent-line { position: absolute; left: 0; top: 0; width: 6px; height: 100%; background: #7c3aed; }
  .corner-dots { position: absolute; bottom: 72px; left: 80px; display: flex; gap: 10px; }
  .dot { width: 10px; height: 10px; border-radius: 50%; background: #7c3aed; opacity: 0.5; }
  .dot.active { opacity: 1; width: 32px; border-radius: 5px; }
</style>
</head>
<body>
<div class="card">
  <div class="accent-line"></div>
  <div class="top-bar">
    <div class="tag">Direitos da Mulher Imigrante</div>
    <div class="date">Maio de 2026</div>
  </div>
  <div class="middle">
    <div class="eyebrow">Mercado de trabalho</div>
    <div class="headline">
      Divorciada,<br>
      mãe e<br>
      <em>estrangeira.</em>
    </div>
    <div class="divider"></div>
    <div class="body-text">
      Por que tantas portas fecham?<br>
      <strong>Isso tem nome: discriminação.</strong><br>
      E tem lei contra isso.
    </div>
  </div>
  <div class="bottom">
    <div>
      <div class="corner-dots">
        <div class="dot active"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>
      <div class="cta" style="margin-bottom:0;">🔗 Link na bio</div>
    </div>
    <div class="hashtags">
      #MulheresImigrantes<br>
      #DireitosDaMulher<br>
      #MãeSolo #Imigrantes
    </div>
  </div>
</div>
</body>
</html>

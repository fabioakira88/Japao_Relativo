<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="title desc">
  <title id="title">Checklist de licencas para trabalhar e empreender no Japao</title>
  <desc id="desc">Mesa editorial com carimbos, documentos, checklist, loja, restaurante, salao e servicos regulados no Japao.</desc>
  <defs>

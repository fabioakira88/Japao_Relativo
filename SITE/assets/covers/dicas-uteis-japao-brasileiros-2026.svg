    <rect x="108" y="460" width="250" height="28" rx="4" fill="#f6f1e8" opacity=".38"/>
    <text x="132" y="292" font-family="Arial, Helvetica, sans-serif" font-size="48" font-weight="700" fill="#c01822">JP POST</text>
  </g>


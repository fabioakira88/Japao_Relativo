<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1200" role="img" aria-labelledby="title desc">
  <title id="title">5 dicas uteis do Japao para brasileiros</title>
  <desc id="desc">Capa editorial com celular exibindo aplicativos uteis do Japao, incluindo Japan Post, PayPay, trens, alertas e Mercari.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#151515"/>
      <stop offset=".46" stop-color="#24201c"/>
      <stop offset="1" stop-color="#080b0c"/>
    </linearGradient>
    <linearGradient id="paper" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fffaf2"/>
      <stop offset="1" stop-color="#e8e1d7"/>
    </linearGradient>
    <radialGradient id="glow" cx=".34" cy=".18" r=".68">
      <stop offset="0" stop-color="#c9473e" stop-opacity=".5"/>
      <stop offset=".42" stop-color="#b08a57" stop-opacity=".18"/>
      <stop offset="1" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">

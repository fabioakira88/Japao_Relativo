    </filter>
    <pattern id="dots" width="24" height="24" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.2" fill="#f5f2ed" opacity=".16"/>
    </pattern>
  </defs>

  <rect width="1600" height="1200" fill="url(#bg)"/>

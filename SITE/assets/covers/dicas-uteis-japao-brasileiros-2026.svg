      <text x="29" y="51" font-family="Arial, Helvetica, sans-serif" font-size="25" font-weight="900" fill="#fff">P</text>
      <text x="26" y="92" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="800" fill="#1d1d1d">PayPay</text>
      <text x="26" y="118" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#6a625b">pagamentos</text>
    </g>


    <text x="96" y="779" font-family="Arial, Helvetica, sans-serif" font-size="36" font-weight="900" fill="#fff">m</text>
    <text x="162" y="760" font-family="Arial, Helvetica, sans-serif" font-size="26" font-weight="800" fill="#1d1d1d">Mercari</text>
    <text x="162" y="795" font-family="Arial, Helvetica, sans-serif" font-size="19" fill="#5a5550">economia no dia a dia</text>


      <path d="M34 58c18-38 44-38 62 0" fill="none" stroke="#fff" stroke-width="7" stroke-linecap="round"/>
      <text x="26" y="92" font-family="Arial, Helvetica, sans-serif" font-size="23" font-weight="800" fill="#1d1d1d">Transit</text>
      <text x="26" y="118" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="#6a625b">trens</text>
